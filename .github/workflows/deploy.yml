name: Deploy ClinMax API (VPS)

# Repositório: back-projeto-clinica (ClinicHub / ClinMax)
# Secrets (Environment Production): SSH_PRIVATE_KEY, HOST, USERNAME, PORT
# Variables: DOTENV_FILE (conteúdo do .env de produção)

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: Branch ou SHA para deploy
        required: false
        type: string
        default: main

concurrency:
  group: deploy-clinmax-api
  cancel-in-progress: true

env:
  DEPLOY_TMP: /tmp/clinmax-api-deploy
  VPS_APP_DIR: ~/clinmax-api
  NGINX_SITE: clinmax-api
  SSH_PORT: ${{ secrets.PORT || '22' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Validar secrets
        env:
          SSH_HOST: ${{ secrets.HOST }}
          SSH_USER: ${{ secrets.USERNAME }}
        run: |
          test -n "$SSH_HOST" || (echo "Secret HOST ausente" && exit 1)
          test -n "$SSH_USER" || (echo "Secret USERNAME ausente" && exit 1)

      - name: Materializar .env de produção
        env:
          DOTENV_FILE: ${{ vars.DOTENV_FILE }}
        run: |
          test -n "$DOTENV_FILE" || (echo "Variable DOTENV_FILE ausente" && exit 1)
          printf '%s\n' "$DOTENV_FILE" > .env.deploy
          tr -d '\r' < .env.deploy > .env.deploy.tmp && mv .env.deploy.tmp .env.deploy
          grep -q '^DATABASE_URL=' .env.deploy
          grep -q '^JWT_SECRET=' .env.deploy
          grep -q '^PORT=' .env.deploy

      - name: Compactar código
        run: git archive --format=tar.gz --output=repo.tar.gz HEAD

      - name: Enviar para VPS
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: |
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 -i ~/.ssh/deploy_key -p ${{ env.SSH_PORT }} \
              ${{ secrets.USERNAME }}@${{ secrets.HOST }} "mkdir -p ${{ env.DEPLOY_TMP }} ${{ env.VPS_APP_DIR }}"
            scp -o StrictHostKeyChecking=no -o ConnectTimeout=60 -i ~/.ssh/deploy_key -P ${{ env.SSH_PORT }} \
              repo.tar.gz ${{ secrets.USERNAME }}@${{ secrets.HOST }}:${{ env.DEPLOY_TMP }}/
            scp -o StrictHostKeyChecking=no -o ConnectTimeout=60 -i ~/.ssh/deploy_key -P ${{ env.SSH_PORT }} \
              .env.deploy deploy/nginx-api.conf deploy/ecosystem.config.cjs deploy/docker-compose.prod.yml \
              ${{ secrets.USERNAME }}@${{ secrets.HOST }}:${{ env.DEPLOY_TMP }}/

      - name: Instalar dependências, migrar DB e reiniciar API
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_wait_seconds: 45
          command: |
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=60 -i ~/.ssh/deploy_key -p ${{ env.SSH_PORT }} \
              ${{ secrets.USERNAME }}@${{ secrets.HOST }} "
              set -e
              APP_DIR=\${HOME}/clinmax-api
              TMP=${{ env.DEPLOY_TMP }}
              rm -rf \"\$APP_DIR\"/*
              tar -xzf \"\$TMP/repo.tar.gz\" -C \"\$APP_DIR\"
              cp \"\$TMP/.env.deploy\" \"\$APP_DIR/.env\"
              cp \"\$TMP/nginx-api.conf\" \"\$APP_DIR/deploy/nginx-api.conf\"
              cp \"\$TMP/ecosystem.config.cjs\" \"\$APP_DIR/deploy/ecosystem.config.cjs\"
              cp \"\$TMP/docker-compose.prod.yml\" \"\$APP_DIR/deploy/docker-compose.prod.yml\"
              cd \"\$APP_DIR\"
              set -a
              . ./.env
              set +a
              APP_PORT=\${PORT:-3550}
              if echo \"\${DATABASE_URL:-}\" | grep -Eq '^file:'; then
                echo 'DATABASE_URL de producao aponta para SQLite (file:...).'
                echo 'Ajuste DOTENV_FILE no GitHub Environment Production para Postgres (127.0.0.1:5433).'
                exit 1
              fi
              if command -v docker >/dev/null 2>&1; then
                if docker ps -a --format '{{.Names}}' | grep -qx clinmax_postgres; then
                  docker start clinmax_postgres 2>/dev/null || true
                else
                  docker compose -f deploy/docker-compose.prod.yml --env-file .env up -d || echo 'Aviso: postgres docker nao subiu — confira DATABASE_URL (.env)'
                fi
              fi
              export PATH=\"\$HOME/.local/bin:\$HOME/.local/share/fnm/current/bin:\$HOME/.fnm/current/bin:/usr/local/bin:/usr/bin:\$PATH\"
              if [ -x \"\$HOME/.local/share/fnm/fnm\" ]; then
                eval \"\$(\$HOME/.local/share/fnm/fnm env)\"
              elif command -v fnm >/dev/null 2>&1; then
                eval \"\$(fnm env)\"
              elif [ -s \"\$HOME/.nvm/nvm.sh\" ]; then
                . \"\$HOME/.nvm/nvm.sh\"
              fi
              if ! command -v node >/dev/null 2>&1; then
                echo 'Node.js nao encontrado na VPS. Rode uma vez via SSH:'
                echo '  curl -fsSL https://fnm.vercel.app/install | bash && eval \"\$(fnm env)\" && fnm install 20 && npm i -g pm2'
                exit 1
              fi
              node -v
              # Mesmo com NODE_ENV=production no .env, precisamos dos @types para o tsc.
              NODE_ENV=development npm ci --include=dev
              npm run build
              npx prisma generate
              npx prisma migrate deploy || npx prisma db push
              npm run db:seed || true
              npm prune --omit=dev
              export NODE_ENV=production
              SITE=${{ env.NGINX_SITE }}
              if ! sudo grep -q 'listen.*443' /etc/nginx/sites-available/\$SITE 2>/dev/null; then
                sudo cp deploy/nginx-api.conf /etc/nginx/sites-available/\$SITE
                sudo ln -sf /etc/nginx/sites-available/\$SITE /etc/nginx/sites-enabled/\$SITE
                echo 'Nginx '"\$SITE"' instalado HTTP - certbot --nginx -d api.clinmax.com.br'
              else
                echo 'Nginx '"\$SITE"' ja tem SSL 443 - mantendo config'
              fi
              sudo nginx -t
              sudo systemctl reload nginx
              if command -v pm2 >/dev/null 2>&1; then
                CLINMAX_API_DIR=\"\$APP_DIR\" pm2 startOrReload deploy/ecosystem.config.cjs --update-env
                pm2 save
              else
                echo 'PM2 não instalado — instale: npm i -g pm2'
                exit 1
              fi
              ok=0
              for i in \$(seq 1 30); do
                if curl -sf \"http://127.0.0.1:\${APP_PORT}/api/health\" >/dev/null; then
                  ok=1
                  break
                fi
                sleep 2
              done
              if [ \"\$ok\" -ne 1 ]; then
                echo \"Healthcheck falhou na porta \${APP_PORT}\"
                pm2 describe clinmax-api || true
                pm2 logs clinmax-api --lines 80 --nostream || true
                exit 1
              fi
              rm -rf \"\$TMP\"
              echo 'ClinMax API deploy OK'
            "
