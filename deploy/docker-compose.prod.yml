# Postgres ClinMax na VPS — porta host 5433 (5432 costuma estar ocupada por outros projetos)
# Uso: docker compose -f deploy/docker-compose.prod.yml --env-file .env up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: clinmax_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinmax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-clinmax}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - clinmax_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  clinmax_pg_data:
